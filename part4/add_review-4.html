<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review - Beachfront Condo</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html"><img src="images/logo.png" alt="HBnB Logo" class="logo"></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <section id="add-review" class="add-review">
            <h1>Reviewing: <span id="place-name">Beachfront Condo</span></h1>
            <h2>Add a Review</h2>

            <form id="review-form" class="form">
                <label for="review">Your Review:</label>
                <textarea id="review" name="review" required></textarea>

                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="1">5-Excelent</option>
                    <option value="2">4-Very good</option>
                    <option value="3">3-Nice</option>
                    <option value="4">2-Poor</option>
                    <option value="5">1-Not recommended</option>
                </select>

                <button type="submit">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; HBnB Evolution 2026. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
